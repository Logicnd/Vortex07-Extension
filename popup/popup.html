<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vortex07</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<header class="bar">
  <span class="tag">Vortex07 0.1.0</span>
  <span class="pill on" id="pill">ON</span>
</header>

<main>
  <h1>Settings</h1>
  <p class="hint">2007 skin for playvortex.io</p>

  <div class="quick-row">
    <label class="quick-label">
      <span>Dark Mode</span>
      <span class="sw"><input type="checkbox" data-key="darkMode"><i></i></span>
    </label>
  </div>

  <div class="opts" id="opts">
    <label class="row">
      <span class="meta">
        <b>Retro skin</b>
        <small>Master on/off</small>
      </span>
      <span class="sw"><input type="checkbox" data-key="enabled" checked><i></i></span>
    </label>
    <label class="row">
      <span class="meta">
        <b>Stage Light</b>
        <small>Dark surround, lit panels</small>
      </span>
      <span class="sw"><input type="checkbox" data-key="darkMode"><i></i></span>
    </label>
    <label class="row">
      <span class="meta">
        <b>Welcome line</b>
        <small>Home greeting with your name</small>
      </span>
      <span class="sw"><input type="checkbox" data-key="welcome" checked><i></i></span>
    </label>
    <label class="row">
      <span class="meta">
        <b>Online dots</b>
        <small>Green dot on online friends</small>
      </span>
      <span class="sw"><input type="checkbox" data-key="onlineDots" checked><i></i></span>
    </label>
    <label class="row">
      <span class="meta">
        <b>Live stats</b>
        <small>Player counts, requests badge</small>
      </span>
      <span class="sw"><input type="checkbox" data-key="liveStats" checked><i></i></span>
    </label>
    <label class="row">
      <span class="meta">
        <b>8-game cap</b>
        <small>Trim home games grid</small>
      </span>
      <span class="sw"><input type="checkbox" data-key="capGames" checked><i></i></span>
    </label>
  </div>

  <button type="button" class="discord" id="discord-btn">Discord Server</button>
  <p class="site"><a href="#" id="site-link">playvortex.io</a></p>
</main>

<footer>vortex07 — classic web edition</footer>

<script src="popup.js"></script>
</body>
</html>
